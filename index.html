<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Verification System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 1.5rem; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
        .logo { width: 80px; margin-bottom: 10px; }
        .status-banner { padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 1.2rem; font-weight: bold; }
        .valid-banner { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .invalid-banner { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        
        /* Table Styling */
        .details-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; }
        .details-table tr { border-bottom: 1px solid #f0f0f0; }
        .details-table tr:last-child { border-bottom: none; }
        .details-table td { padding: 10px 5px; font-size: 0.9rem; vertical-align: top; }
        .label { color: #666; font-weight: 600; text-align: left; width: 40%; }
        .value { color: #333; text-align: left; font-weight: 400; width: 60%; }
        
        .profile-img { width: 100px; height: 100px; border-radius: 2%; object-fit: cover; border: 3px solid #2e7d32; margin: 0 auto 15px; display: block; }
    </style>
</head>
<body>

<div class="card" id="result-card">
    <img src="hclogo.jpg" alt="Logo" class="logo">
    <div id="status">Verifying...</div>
    <div id="user-details" style="display:none;"></div>
</div>

<script>
    const idDatabase = {
        "101": { 
            name: "Uttam Chabungbam", 
            role: "Computer Assistant", 
            ein: "111533", 
            fname: "Ch. Ibotombi Singh", 
            mname: "L. Ibeyaima Devi", 
            peradd: "Sagolband Moirang Leirak, Imphal West District, Manipur - 795001", 
            preadd: "Sagolband Moirang Leirak, Imphal West District, Manipur - 795001", 
            sex: "Male", 
            dob: "12-11-1983", 
            expiry: "31-12-2031",
            photo: "uttam.jpg" 
        },
        "102": { 
            name: "Phuraitlatpam Ongkernath Sharma", 
            role: "Sr. Judicial Assistant", 
            ein: "110306", 
            fname: "(L) Ph. Jiten Sharma", 
            mname: "(L) Ph. Shushila Devi", 
            peradd: "Sagolband Salam Leikai Imphal West District, Manipur - 795001", 
            preadd: "Sagolband Salam Leikai Imphal West District, Manipur - 795001", 
            sex: "Male", 
            dob: "01-01-1974", 
            expiry: "31-12-2031",
            photo: "ongkernath.jpg"
        }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    const statusDiv = document.getElementById('status');
    const detailsDiv = document.getElementById('user-details');

    if (id && idDatabase[id]) {
        const user = idDatabase[id];
        statusDiv.className = "status-banner valid-banner";
        statusDiv.innerHTML = "✅ VALID ID-CARD";
        
        detailsDiv.style.display = 'block';
        detailsDiv.innerHTML = `
            <img src="photos/${user.photo}" class="profile-img" alt="Profile Photo">
            <table class="details-table">
                <tr><td class="label">ID No.</td><td class="value">${id}</td></tr>
                <tr><td class="label">Name</td><td class="value"><strong>${user.name}</strong></td></tr>
                <tr><td class="label">Role</td><td class="value">${user.role}</td></tr>
                <tr><td class="label">EIN</td><td class="value">${user.ein}</td></tr>
                <tr><td class="label">Father's Name</td><td class="value">${user.fname}</td></tr>
                <tr><td class="label">Mother's Name</td><td class="value">${user.mname}</td></tr>
                <tr><td class="label">Sex</td><td class="value">${user.sex}</td></tr>
                <tr><td class="label">Date of Birth</td><td class="value">${user.dob}</td></tr>
                <tr><td class="label">Perm. Address</td><td class="value">${user.peradd}</td></tr>
                <tr><td class="label">Pres. Address</td><td class="value">${user.preadd}</td></tr>
                <tr><td class="label">Expires</td><td class="value" style="color: #c62828;">${user.expiry}</td></tr>
            </table>
        `;
    } else {
        statusDiv.className = "status-banner invalid-banner";
        statusDiv.innerHTML = "❌ INVALID ID-CARD ";
        detailsDiv.style.display = 'block';
        detailsDiv.innerHTML = "<p>No matching record found in the database.</p>";
    }
</script>
</body>
</html>
